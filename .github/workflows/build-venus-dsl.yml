name: Build Venus Kernel (XiaoYang docker sukisu-ultra)

# 自建 venus 内核（基于 hushangda DSL 源码 5.4.302）。
# 默认行为(无需任何参数)：
#   1. 注入 Docker 所需内核配置
#   2. KSU 用 fork 自带的 ReSukiSU 子模块(fc804b6, 配套 build_venus.sh, 带SUSFS/多管理器,
#      原生适配 venus 5.4)—— 不再换上游/不打补丁。多管理器模式靠APK签名匹配, 配任意SukiSU管理器。
#   3. 内核名设为 -XiaoYang-docker-sukisu-ultra

on:
  workflow_dispatch: {}
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/build-venus-dsl.yml'

env:
  ARCH: arm64
  CLANG_VERSION: clang-r416183b

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL || true
          sudo docker image prune --all --force || true
          df -h

      - name: Set up build environment
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            git make bc bison flex libssl-dev libelf-dev \
            build-essential ca-certificates curl python3 \
            zip unzip lz4 cpio kmod

      - name: Checkout kernel source (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1
          path: android-kernel

      - name: Show source info
        run: |
          cd android-kernel
          echo "=== kernel version (Makefile) ==="
          grep -E '^(VERSION|PATCHLEVEL|SUBLEVEL|EXTRAVERSION)' Makefile | head -4
          echo "=== KernelSU submodule (旧) ==="
          ls -la KernelSU || echo "KernelSU dir missing!"
          echo "=== venus_defconfig localversion ==="
          head -1 arch/arm64/configs/venus_defconfig

      - name: Set kernel name (localversion)
        run: |
          set -e
          cd android-kernel
          DEFCONFIG=arch/arm64/configs/venus_defconfig
          NAME="-XiaoYang-docker-sukisu-ultra"
          echo "=== 改内核名 LOCALVERSION -> ${NAME} ==="
          sed -i "/^CONFIG_LOCALVERSION=/d" "$DEFCONFIG"
          echo "CONFIG_LOCALVERSION=\"${NAME}\"" >> "$DEFCONFIG"
          # 关掉 auto 后缀(+),避免 -dirty/+ 之类污染版本名;hash 由 git 提供
          sed -i "/^CONFIG_LOCALVERSION_AUTO=/d" "$DEFCONFIG"
          echo "# CONFIG_LOCALVERSION_AUTO is not set" >> "$DEFCONFIG"
          grep -E 'CONFIG_LOCALVERSION' "$DEFCONFIG"

      - name: Download Android Clang toolchain (r416183b)
        run: |
          set -e
          CLANG_VER=clang-r416183b
          got=""

          # ---- 方式1: googlesource +archive (Actions 网络通常可达) ----
          echo "=== try1: googlesource archive ==="
          if curl -fL --retry 3 --connect-timeout 30 -o clang.tar.gz \
               "https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/main/${CLANG_VER}.tar.gz"; then
            if tar tzf clang.tar.gz >/dev/null 2>&1; then
              mkdir -p clang && tar xzf clang.tar.gz -C clang && got=1
              echo "got clang via googlesource archive"
            fi
          fi

          # ---- 方式2: git sparse-checkout 只拉 r416183b 子目录 ----
          if [ -z "$got" ]; then
            echo "=== try2: git sparse-checkout ==="
            rm -rf clang_repo
            git clone --depth=1 --filter=blob:none --sparse \
              https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86 clang_repo
            cd clang_repo
            git sparse-checkout set "${CLANG_VER}"
            cd ..
            if [ -d "clang_repo/${CLANG_VER}/bin" ]; then
              mv "clang_repo/${CLANG_VER}" clang && got=1
              echo "got clang via git sparse-checkout"
            fi
          fi

          # ---- 方式3: ZyCromerZ 镜像（最新ZyC clang，作为兜底；版本不同但能编5.4）----
          if [ -z "$got" ]; then
            echo "=== try3: ZyCromerZ ZyC clang fallback ==="
            ZURL=$(curl -fsSL "https://raw.githubusercontent.com/ZyCromerZ/Clang/main/Clang-main-link.txt" | tail -1)
            echo "ZyC url: $ZURL"
            mkdir -p clang
            curl -fL --retry 3 -o zyc.tar.gz "$ZURL"
            tar xzf zyc.tar.gz -C clang
            got=1
          fi

          if [ -z "$got" ]; then echo "ALL clang download methods failed"; exit 1; fi
          echo "=== clang version ==="
          ./clang/bin/clang --version | head -2

      - name: Inject Docker-required configs into venus_defconfig
        run: |
          set -e
          cd android-kernel
          DEFCONFIG=arch/arm64/configs/venus_defconfig
          echo "=== injecting Docker/LXC-required configs ==="
          for opt in PID_NS USER_NS IPC_NS POSIX_MQUEUE \
                     CGROUP_DEVICE CGROUP_PIDS \
                     BRIDGE_NETFILTER VLAN_8021Q \
                     NETFILTER_XT_MATCH_ADDRTYPE \
                     CHECKPOINT_RESTORE \
                     NETFILTER_XT_TARGET_CHECKSUM \
                     CFS_BANDWIDTH \
                     CGROUP_HUGETLB \
                     NET_CLS_CGROUP CGROUP_NET_PRIO CGROUP_NET_CLASSID \
                     CGROUP_PERF \
                     MACVLAN IPVLAN VXLAN \
                     DUMMY VETH BRIDGE; do
            sed -i "/^# CONFIG_${opt} is not set/d" "$DEFCONFIG"
            sed -i "/^CONFIG_${opt}=/d" "$DEFCONFIG"
            echo "CONFIG_${opt}=y" >> "$DEFCONFIG"
          done
          echo "=== docker/lxc-related lines now ==="
          grep -E 'PID_NS|USER_NS|IPC_NS|CGROUP_DEVICE|CGROUP_PIDS|BRIDGE_NETFILTER|VLAN_8021Q|ADDRTYPE|POSIX_MQUEUE|CHECKPOINT|XT_TARGET_CHECKSUM|CFS_BANDWIDTH|HUGETLB|NET_CLS_CGROUP|NET_PRIO|NET_CLASSID|CGROUP_PERF|MACVLAN|IPVLAN|VXLAN|DUMMY|VETH|BRIDGE' "$DEFCONFIG" || true

      - name: Build kernel (replicate build_venus.sh)
        run: |
          cd android-kernel
          export PATH="$(pwd)/../clang/bin:$PATH"
          export ARCH=arm64
          export SUBARCH=arm64
          export LLVM=1
          export LLVM_IAS=1
          export CC=clang
          export LD=ld.lld
          export AR=llvm-ar
          export NM=llvm-nm
          export OBJCOPY=llvm-objcopy
          export OBJDUMP=llvm-objdump
          export STRIP=llvm-strip
          export READELF=llvm-readelf
          unset KSU_MANAGER_PACKAGE

          OUT=out
          mkdir -p "$OUT"

          MAKE_ARGS="O=$OUT ARCH=arm64 SUBARCH=arm64 LLVM=1 LLVM_IAS=1 CC=clang LD=ld.lld AR=llvm-ar NM=llvm-nm OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump STRIP=llvm-strip READELF=llvm-readelf"

          echo "=== make venus_defconfig ==="
          make $MAKE_ARGS venus_defconfig

          echo "=== inject ZRAM/F2FS/KSU/SuSFS/KPM via scripts/config (same as build_venus.sh) ==="
          ./scripts/config --file "$OUT/.config" \
            --enable ZRAM \
            --enable CRYPTO_LZ4 \
            --enable ZRAM_DEF_COMP_LZ4 \
            --disable ZRAM_DEF_COMP_LZORLE \
            --disable ZRAM_DEF_COMP_LZO \
            --disable ZRAM_DEF_COMP_ZSTD \
            --disable ZRAM_DEF_COMP_LZ4HC \
            --disable ZRAM_DEF_COMP_842 \
            --enable F2FS_FS_COMPRESSION \
            --enable F2FS_FS_LZO \
            --enable F2FS_FS_LZORLE \
            --enable F2FS_FS_LZ4 \
            --enable F2FS_FS_LZ4HC \
            --enable F2FS_FS_ZSTD \
            --enable F2FS_UNFAIR_RWSEM \
            --enable F2FS_CP_OPT \
            --enable KSU \
            --set-str KSU_FULL_NAME_FORMAT "%TAG_NAME%-%COMMIT_SHA%@%REPO_NAME%" \
            --enable KSU_MULTI_MANAGER_SUPPORT \
            --enable KSU_DISABLE_IN_RECOVERY \
            --disable KSU_TRACEPOINT_HOOK \
            --disable KSU_MANUAL_HOOK \
            --enable KSU_SUSFS \
            --enable KSU_SUSFS_SUS_PATH \
            --enable KSU_SUSFS_SUS_MOUNT \
            --enable KSU_SUSFS_SUS_KSTAT \
            --enable KSU_SUSFS_SPOOF_UNAME \
            --enable KSU_SUSFS_ENABLE_LOG \
            --enable KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS \
            --enable KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG \
            --enable KSU_SUSFS_OPEN_REDIRECT \
            --enable KSU_SUSFS_SUS_MAP \
            --enable KALLSYMS \
            --enable KALLSYMS_ALL \
            --enable BPF_STREAM_PARSER \
            --enable KPM

          echo "=== olddefconfig ==="
          make $MAKE_ARGS olddefconfig

          echo "=== verify docker/lxc configs took effect in .config ==="
          MISSING=""
          for opt in PID_NS USER_NS IPC_NS POSIX_MQUEUE \
                     CGROUP_DEVICE CGROUP_PIDS \
                     BRIDGE_NETFILTER VLAN_8021Q \
                     NETFILTER_XT_MATCH_ADDRTYPE CHECKPOINT_RESTORE \
                     NETFILTER_XT_TARGET_CHECKSUM CFS_BANDWIDTH \
                     NET_CLS_CGROUP CGROUP_NET_PRIO CGROUP_NET_CLASSID \
                     CGROUP_PERF MACVLAN IPVLAN VXLAN VETH BRIDGE; do
            if grep -q "^CONFIG_${opt}=y" "$OUT/.config"; then
              echo "  OK  CONFIG_${opt}=y"
            elif grep -q "^CONFIG_${opt}=m" "$OUT/.config"; then
              echo "  OK  CONFIG_${opt}=m (module)"
            else
              echo "  !!  CONFIG_${opt} NOT enabled"
              MISSING="$MISSING $opt"
            fi
          done
          if [ -n "$MISSING" ]; then
            echo "WARN: 这些docker配置没生效(可能缺依赖):$MISSING"
          fi

          echo "=== verify KSU/SUSFS enabled (作者 build_venus.sh 同款) ==="
          for opt in KSU KSU_MULTI_MANAGER_SUPPORT KSU_SUSFS KPM; do
            line=$(grep -E "^CONFIG_${opt}=" "$OUT/.config" || true)
            if [ -n "$line" ]; then echo "  OK  $line"; else echo "  !!  CONFIG_${opt} NOT set"; fi
          done
          if ! grep -qE '^CONFIG_KSU=[ym]' "$OUT/.config"; then
            echo "FATAL: CONFIG_KSU 没开成"; exit 1
          fi

          echo "=== build Image Image.gz dtbs ==="
          make -j"$(nproc)" $MAKE_ARGS Image Image.gz dtbs

          echo "=== built kernel version ==="
          if [ -f "$OUT/arch/arm64/boot/Image.gz" ]; then
            gzip -dc "$OUT/arch/arm64/boot/Image.gz" > /tmp/Image_check
            grep -a -m1 -o "Linux version 5[^)]*)" /tmp/Image_check || true
          fi
          ls -la "$OUT/arch/arm64/boot/"

      - name: Collect artifacts
        run: |
          cd android-kernel
          mkdir -p ../artifacts
          cp out/arch/arm64/boot/Image       ../artifacts/ 2>/dev/null || true
          cp out/arch/arm64/boot/Image.gz    ../artifacts/ 2>/dev/null || true
          cp out/arch/arm64/boot/dtb*        ../artifacts/ 2>/dev/null || true
          echo "=== artifacts ==="
          ls -la ../artifacts/

      - name: Upload kernel artifacts
        uses: actions/upload-artifact@v4
        with:
          name: venus-XiaoYang-docker-sukisu-ultra
          path: artifacts/*
